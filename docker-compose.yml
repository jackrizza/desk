services:
  postgres:
    image: postgres:17-alpine
    container_name: desk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-desk}
      POSTGRES_USER: ${POSTGRES_USER:-desk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-desk}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-desk} -d ${POSTGRES_DB:-desk}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  openapi:
    build:
      context: .
      dockerfile: apps/openapi/Dockerfile
    container_name: desk-openapi
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-desk}:${POSTGRES_PASSWORD:-desk}@postgres:5432/${POSTGRES_DB:-desk}
      API_BIND_ADDRESS: 0.0.0.0:3000
      API_PUBLIC_BASE_URL: ${API_PUBLIC_BASE_URL:-http://localhost:3000/api}
      CACHE_DIR: /app/cache_data
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-http://localhost:5173}
      RUST_LOG: ${RUST_LOG:-info}
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:3000/api/health > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - openapi_cache:/app/cache_data
    ports:
      - "${OPENAPI_PORT:-3000}:3000"

  engine:
    build:
      context: .
      dockerfile: apps/engine/Dockerfile
    container_name: desk-engine
    restart: unless-stopped
    depends_on:
      openapi:
        condition: service_healthy
    environment:
      ENGINE_NAME: ${ENGINE_NAME:-engine-1}
      OPENAPI_BASE_URL: ${OPENAPI_BASE_URL:-http://openapi:3000/api}
      ENGINE_POLL_INTERVAL_SECONDS: ${ENGINE_POLL_INTERVAL_SECONDS:-30}
      ENGINE_ENABLE_TEST_PAPER_ORDERS: ${ENGINE_ENABLE_TEST_PAPER_ORDERS:-false}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - openapi_cache:/app/cache_data

  scrapper:
    build:
      context: .
      dockerfile: apps/scrapper/Dockerfile
    container_name: desk-scrapper
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      openapi:
        condition: service_healthy
    environment:
      SCRAPPER_NAME: ${SCRAPPER_NAME:-scrapper-1}
      SCRAPPER_DATABASE_URL: postgres://${POSTGRES_USER:-desk}:${POSTGRES_PASSWORD:-desk}@postgres:5432/${POSTGRES_DB:-desk}
      OPENAPI_BASE_URL: ${OPENAPI_BASE_URL:-http://openapi:3000/api}
      SCRAPPER_POLL_INTERVAL_SECONDS: ${SCRAPPER_POLL_INTERVAL_SECONDS:-30}
      RUST_LOG: ${RUST_LOG:-info}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: desk-frontend
    restart: unless-stopped
    depends_on:
      openapi:
        condition: service_healthy
      engine:
        condition: service_started
      scrapper:
        condition: service_started
    environment:
      VITE_DEV_PROXY_TARGET: http://openapi:3000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

volumes:
  postgres_data:
  openapi_cache:
  frontend_node_modules:
